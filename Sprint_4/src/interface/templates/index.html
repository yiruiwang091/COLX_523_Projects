<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Product Reviews Corpus: Coleman</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f8f8f8;
            color: #111;
        }

        .query-match {
            background: #d9ecff;
            border-radius: 4px;
            padding: 0 2px;
        }

        .page {
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 24px 48px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 54px;
            margin: 0 0 32px;
            text-align: center;
        }

        h2 {
            font-size: 36px;
            margin: 0 0 22px;
        }

        h3 {
            font-size: 20px;
            margin: 0 0 12px;
        }

        /* top search */
        .top-search-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .top-search {
            width: 100%;
            max-width: 920px;
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .top-search input[type="text"] {
            flex: 1;
            min-width: 280px;
            height: 54px;
            padding: 0 18px;
            font-size: 20px;
            border: 1px solid #ccc;
            border-radius: 14px;
            outline: none;
            background: white;
            box-sizing: border-box;
        }

        .top-search input[type="text"]:focus,
        select:focus {
            border-color: #666;
        }

        .top-search button {
            height: 54px;
            padding: 0 24px;
            font-size: 20px;
            border: none;
            border-radius: 14px;
            background: #e0e0e0;
            cursor: pointer;
        }

        .top-search button:hover,
        button:hover {
            background: #d5d5d5;
        }

        /* main layout */
        .main-layout {
            display: flex;
            gap: 28px;
            align-items: flex-start;
        }

        /* sidebar */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background: #f3f3f3;
            border: 1px solid #ccc;
            border-radius: 16px;
            padding: 22px 20px;
            box-sizing: border-box;
            position: sticky;
            top: 18px;

            max-height: calc(100vh - 36px);
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 30px;
            margin: 0 0 20px;
        }

        .filter-section {
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid #ddd;
        }

        .filter-section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .filter-label {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .filter-note {
            font-size: 14px;
            color: #666;
            margin-top: 6px;
            line-height: 1.5;
        }

        .filter-option {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.45;
        }

        .filter-option input[type="checkbox"],
        .filter-option input[type="radio"] {
            margin-top: 3px;
            cursor: pointer;
        }

        .filter-option {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 16px;
            line-height: 1.45;
        }

        .sub-filter-toggle {
            margin-top: 18px;
            padding: 14px 14px 12px;
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 12px;
        }

        .sub-filter-label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.45;
            cursor: pointer;
        }

        .sub-filter-label input[type="checkbox"] {
            margin-top: 3px;
        }

       .sub-filter-help {
            margin-top: 8px;
            margin-left: 28px;
            font-size: 13px;
            line-height: 1.45;
            color: #666;
        }

        .checkbox-list {
            max-height: 280px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 13px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #e0e0e0;
            cursor: pointer;
        }

        .apply-btn {
            background: #dedede;
        }

        .clear-btn {
            background: #ececec;
        }

        .hidden {
            display: none !important;
        }

        /* results */
        .results-panel {
            flex: 1;
            min-width: 0;
        }

        .message {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            background: white;
            border: 1px solid #ddd;
        }

        .error {
            color: #b00020;
            background: #fff3f4;
            border-color: #f0c2c7;
        }

        .muted {
            color: #666;
        }

        .result {
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 18px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .result-top {
            display: flex;
            gap: 18px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .result-image {
            width: 140px;
            min-width: 140px;
        }

        .result-image img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            border: 1px solid #e3e3e3;
            border-radius: 10px;
            background: #fff;
        }

        .result-image .image-placeholder {
            width: 140px;
            height: 140px;
            border: 1px solid #e3e3e3;
            border-radius: 10px;
            background: #f7f7f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            box-sizing: border-box;
        }

        .result-image .image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
            background: transparent;
        }

        .result-main {
            flex: 1;
            min-width: 320px;
        }

        .result-line {
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .result-line strong {
            display: inline-block;
            min-width: 150px;
        }

        .snippet {
            color: #333;
            margin-top: 6px;
        }

        .score {
            color: #666;
            font-size: 14px;
        }

        .rating {
            color: #333;
            font-size: 15px;
        }

        .annotations {
            margin-top: 14px;
            padding: 14px 16px;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .annotations h4 {
            margin: 0 0 12px 0;
            font-size: 16px;
        }

        .annotation-section {
            margin-bottom: 14px;
        }

        .annotation-section:last-child {
            margin-bottom: 0;
        }

        .annotation-section-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .annotation-chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .annotation-chip {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            font-size: 14px;
            line-height: 1.4;
        }

        .annotation-chip .span-text {
            font-weight: bold;
        }

        .annotation-chip .meta {
            color: #555;
            margin-left: 6px;
        }

        .review-highlight-box {
            padding: 12px 14px;
            border: 1px solid #e8e1b5;
            background: #fffdf6;
            border-radius: 10px;
            line-height: 1.8;
            white-space: normal;
            word-break: break-word;
        }
        
        .review-segment {
            display: inline;
            padding: 1px 2px;
            border-radius: 4px;
            transition: box-shadow 0.15s ease, filter 0.15s ease;
        }

        .review-segment.annotated {
            font-weight: 600;
            cursor: help;
        }
        
        /* sentiment colors */
        .review-segment.sentiment-positive {
            background: #dff5e4;
            box-shadow: inset 0 0 0 1px #9fd2ab;
        }

        .review-segment.sentiment-negative {
            background: #ffe680;
            box-shadow: inset 0 0 0 1px #e1b900;
        }

        .review-segment.sentiment-neutral {
            background: #ececec;
            box-shadow: inset 0 0 0 1px #c9c9c9;
        }

        /* overlap indicator */
        .review-segment.overlap {
            box-shadow:
                inset 0 0 0 1px currentColor,
                0 0 0 1.5px rgba(80, 80, 80, 0.35);
            border-bottom: 2px dashed rgba(80, 80, 80, 0.55);
        }
        
        .review-segment.annotated:hover {
            filter: brightness(0.97);
        }

        .review-legend {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .review-legend-item {
            font-size: 13px;
            padding: 5px 8px;
            border-radius: 999px;
            background: #f2f2f2;
            border: 1px solid #ddd;
        }

        .result-actions {
            margin-top: 14px;
        }

        .details-panel {
            margin-top: 40px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 22px;
            white-space: pre-wrap;
            overflow-x: auto;
        }

        .tooltip {
            position: relative;
            cursor: help;
            border-bottom: 1px dotted #888;
        }

        .tooltip-text {
            visibility: hidden;
            width: 260px;
            background-color: #333;
            color: #fff;
            text-align: left;
            padding: 8px 10px;
            border-radius: 6px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 0;
            font-size: 13px;
            line-height: 1.4;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .sentiment-legend-box {
            margin: 8px 0 16px 0;
            padding: 10px 12px;
            border: 1px solid #e3e3e3;
            border-radius: 10px;
            background: #fafafa;
            display: inline-block;
        }
        
        .legend-title {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            font-size: 14px;
        }

        .legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: inline-block;
            border: 1px solid #ccc;
        }

        .legend-positive {
            background: #dff5e4;
            border-color: #9fd2ab;
        }

        .legend-negative {
            background: #ffe680;
            border-color: #e1b900;
        }

        .legend-neutral {
            background: #ececec;
            border-color: #c9c9c9;
        }

        .legend-overlap {
            background: #fff;
            border: 2px dashed rgba(80, 80, 80, 0.55);
        }

        .legend-query-chip {
            background: #d9ecff;
            border: 1px solid #8bbbe8;
            border-radius: 6px;
            padding: 2px 8px;
        }

        .sort-bar {
            margin: 8px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-bar select {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
            font-size: 14px;
        }

        @media (max-width: 980px) {
            .main-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
            }

            .result-top {
                flex-direction: column;
            }

            .result-image {
                width: 140px;
                min-width: 140px;
            }
        }

    </style>
</head>
<body>
    <div class="page">
        <h1>Amazon Product Reviews Corpus: Coleman</h1>

        <div class="top-search-wrap">
            <div class="top-search">
                <input id="query" type="text" placeholder="Enter keyword to search the full corpus">
                <button onclick="searchReviews()">Search</button>
            </div>
        </div>

        <div class="main-layout">
            <aside class="sidebar">
                <div class="sidebar-title">Filters</div>

                <div class="filter-section">
                    <div class="filter-label">Search Field</div>

                    <label class="filter-option">
                        <input type="radio" name="field" value="all" checked>
                        <span>all</span>
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="field" value="title">
                        <span>title</span>
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="field" value="description">
                        <span>description</span>
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="field" value="reviewText">
                        <span>reviewText</span>
                    </label>
                </div>

                <div class="filter-section">
                    <div class="filter-label">Annotation Option</div>

                    <label class="filter-option">
                        <input type="checkbox" id="annotated_only">
                        <span>Annotated data only</span>
                    </label>

                    <div id="annotation-filter-group" class="hidden" style="margin-top: 14px;">
                        <div class="filter-label" style="font-size:18px;">Attribute</div>
                        <label class="filter-option">
                            <input type="checkbox" id="select_all_attributes">
                            <span>Select all</span>
                        </label>
                        <div class="checkbox-list" id="attribute-list">
                            <label class="filter-option"><input type="checkbox" name="attribute" value="battery_type"><span>battery_type</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="brand_trust"><span>brand_trust</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="brightness"><span>brightness</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="build_quality"><span>build_quality</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="capacity"><span>capacity</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="color"><span>color</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="comfort"><span>comfort</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="compatibility"><span>compatibility</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="customer_service"><span>customer_service</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="design"><span>design</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="durability"><span>durability</span></label>

                            <label class="filter-option"><input type="checkbox" name="attribute" value="ease_of_use"><span>ease_of_use</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="environmental_impact"><span>environmental_impact</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="included_items"><span>included_items</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="insulation"><span>insulation</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="leak_resistance"><span>leak_resistance</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="material"><span>material</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="odor_resistance"><span>odor_resistance</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="overall"><span>overall</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="performance"><span>performance</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="portability"><span>portability</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="power"><span>power</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="price"><span>price</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="privacy"><span>privacy</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="purchase_intent"><span>purchase_intent</span></label>
                            <label class="filter-option"><input type="checkbox" name="attribute" value="purchase_recommendation"><span>purchase_recommendation</span></label>

                </div>

    <script>
        const queryInput = document.getElementById("query");
        const annotatedOnlyCheckbox = document.getElementById("annotated_only");
        const annotationFilterGroup = document.getElementById("annotation-filter-group");
        const reviewSentimentOnlyCheckbox = document.getElementById("review_sentiment_only");
        const sentimentFilterGroup = document.getElementById("sentiment-filter-group");
        const selectAllAttributesCheckbox = document.getElementById("select_all_attributes");

        queryInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                searchReviews();
            }
        });

        function escapeHtml(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function highlightQueryMatches(text, query) {
            const safeText = escapeHtml(text || "");
            const q = (query || "").trim();
            if (!q) return safeText;

            const terms = q.split(/\s+/).filter(Boolean);
            if (!terms.length) return safeText;

            const pattern = terms.map(escapeRegExp).join("|");
            const regex = new RegExp(`(${pattern})`, "gi");

            return safeText.replace(regex, `<span class="query-match">$1</span>`);
        }

        function sortResults(results, sortBy) {
            const items = [...results];

            if (sortBy === "rating_desc") {
                items.sort((a, b) => (Number(b.overall) || -Infinity) - (Number(a.overall) || -Infinity));
            } else if (sortBy === "rating_asc") {
                items.sort((a, b) => (Number(a.overall) || Infinity) - (Number(b.overall) || Infinity));
            } else if (sortBy === "doc_id_asc") {
                items.sort((a, b) => String(a.doc_id).localeCompare(String(b.doc_id), undefined, { numeric: true }));
            } else {
                items.sort((a, b) => (Number(b.score) || -Infinity) - (Number(a.score) || -Infinity));
            }

            return items;
        }

        function normalizeReviewWhitespace(text) {
            if (!text) return "";
            return text
                .replace(/\s*\n+\s*/g, " ")
                .replace(/[ \t]+/g, " ");
        }

        function getSelectedRadio(name) {
            const checked = document.querySelector(`input[name="${name}"]:checked`);
            return checked ? checked.value : "";
        }

        function getCheckedValues(name) {
            return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`))
                .map(el => el.value);
        }

        function clearCheckedValues(name) {
            document.querySelectorAll(`input[name="${name}"]`).forEach(el => {
                el.checked = false;
            });
        }

        function getAttributeCheckboxes() {
            return Array.from(document.querySelectorAll('input[name="attribute"]'));
        }
        
        function syncSelectAllAttributesState() {
            const attributeCheckboxes = getAttributeCheckboxes();
            const checkedCount = attributeCheckboxes.filter(cb => cb.checked).length;

            selectAllAttributesCheckbox.checked =
            attributeCheckboxes.length > 0 && checkedCount === attributeCheckboxes.length;

            selectAllAttributesCheckbox.indeterminate =
            checkedCount > 0 && checkedCount < attributeCheckboxes.length;
        }

        function updateFilterVisibility() {
            const showAnnotationFilters = annotatedOnlyCheckbox.checked;
            annotationFilterGroup.classList.toggle("hidden", !showAnnotationFilters);
            
            if (!showAnnotationFilters) {
                clearCheckedValues("attribute");
                selectAllAttributesCheckbox.checked = false;
                selectAllAttributesCheckbox.indeterminate = false;

                reviewSentimentOnlyCheckbox.checked = false;
                clearCheckedValues("sentiment");
                sentimentFilterGroup.classList.add("hidden");
                return;
            }
            
            const showSentimentFilters = reviewSentimentOnlyCheckbox.checked;
            sentimentFilterGroup.classList.toggle("hidden", !showSentimentFilters);
            
            if (!showSentimentFilters) {
                clearCheckedValues("sentiment");
            }
            syncSelectAllAttributesState();
        }

        annotatedOnlyCheckbox.addEventListener("change", updateFilterVisibility);
        reviewSentimentOnlyCheckbox.addEventListener("change", updateFilterVisibility);
        document.getElementById("sort_by").addEventListener("change", searchReviews);
        selectAllAttributesCheckbox.addEventListener("change", function() {
            const checked = this.checked;
            getAttributeCheckboxes().forEach(cb => {
                cb.checked = checked;
            });
            this.indeterminate = false;
        });
        
        getAttributeCheckboxes().forEach(cb => {
            cb.addEventListener("change", syncSelectAllAttributesState);
        });

        function buildSnippetText(r) {
            const text = r.snippet || "";
            const maxLen = 120;
            if (text.length > maxLen) {
                return text.substring(0, maxLen) + "...";
            }
            return text;
        }

        function groupAnnotations(annotations) {
            const grouped = {
                title: [],
                description: [],
                review: []
            };

            (annotations || []).forEach(a => {
                const section = (a.section || "").toLowerCase();
                if (section === "title") {
                    grouped.title.push(a);
                } else if (section === "description") {
                    grouped.description.push(a);
                } else if (section === "review") {
                    grouped.review.push(a);
                }
            });

            return grouped;
        }

        function filterAnnotationsForDisplay(annotations, selectedAttributes, selectedSentiments, applyReviewSentimentOnly) {
            return (annotations || []).filter(a => {
                const section = (a.section || "").toLowerCase();

                const matchAttribute =
                    selectedAttributes.length === 0 || selectedAttributes.includes(a.label || "");

                let matchSentiment = true;
                if (applyReviewSentimentOnly) {
                    if (section === "review") {
                        matchSentiment =
                            selectedSentiments.length === 0 || selectedSentiments.includes(a.sentiment || "");
                    }
                }

                return matchAttribute && matchSentiment;
            });
        }

        function renderSpanLabelChips(items) {
            if (!items || items.length === 0) {
                return `<div class="muted">No matching annotations.</div>`;
            }

            return `
                <div class="annotation-chip-list">
                    ${items.map(a => `
                        <div class="annotation-chip">
                            <span class="span-text">${escapeHtml(a.text || "")}</span>
                            <span class="meta">(${escapeHtml(a.label || "")}${a.sentiment ? ", " + escapeHtml(a.sentiment) : ""})</span>
                        </div>
                    `).join("")}
                </div>
            `;
        }

        function highlightReviewText(reviewText, reviewAnnotations, query) {
            if (!reviewText) {
                return `<div class="muted">No review text available.</div>`;
            }
            
            if (!reviewAnnotations || reviewAnnotations.length === 0) {
                return `<div class="review-highlight-box">${highlightQueryMatches(reviewText, query)}</div>`;
            }
            
            const validAnnotations = [...reviewAnnotations]
                .filter(a =>
                    typeof a.start === "number" &&
                    typeof a.end === "number" &&
                    a.end > a.start
                )   
                .map(a => ({
                    ...a,
                    start: Math.max(0, a.start),
                    end: Math.min(reviewText.length, a.end)
                }))
                .filter(a => a.end > a.start);
                
            if (validAnnotations.length === 0) {
                return `<div class="review-highlight-box">${highlightQueryMatches(reviewText, query)}</div>`;
            }

            const boundaries = new Set([0, reviewText.length]);
            validAnnotations.forEach(a => {
                boundaries.add(a.start);
                boundaries.add(a.end);
            });

            const points = Array.from(boundaries).sort((a, b) => a - b);

            let html = "";
            
            for (let i = 0; i < points.length - 1; i++) {
                const segStart = points[i];
                const segEnd = points[i + 1];

                if (segEnd <= segStart) continue;

                const rawSegmentText = reviewText.slice(segStart, segEnd);
                const segmentText = normalizeReviewWhitespace(rawSegmentText);
                
                if (!segmentText) continue;
                const covering = validAnnotations.filter(a => a.start <= segStart && a.end >= segEnd);
                
                if (covering.length === 0) {
                    html += highlightQueryMatches(segmentText, query);
                    continue;
                }
                const tooltipText = covering
                    .map(a => `${a.label || "annotation"}${a.sentiment ? " | " + a.sentiment : ""}`)
                    .join(" ; ");
                    
                const sentiments = covering
                    .map(a => (a.sentiment || "").toLowerCase())
                    .filter(Boolean);
                    
                let sentimentClass = "sentiment-neutral";
                if (sentiments.includes("negative")) {
                    sentimentClass = "sentiment-negative";
                } else if (sentiments.includes("positive")) {
                    sentimentClass = "sentiment-positive";
                }
                
                const overlapClass = covering.length >= 2 ? "overlap" : "";
                
                html += `<span class="review-segment annotated ${sentimentClass} ${overlapClass}" title="${escapeHtml(tooltipText)}">${highlightQueryMatches(segmentText, query)}</span>`;
            }
            
            const legend = validAnnotations.map(a => {
                const label = escapeHtml(a.label || "");
                const sentiment = escapeHtml(a.sentiment || "");
                const text = escapeHtml(a.text || reviewText.slice(a.start, a.end) || "");
                return `
                    <div class="review-legend-item">
                        ${text} → ${label}${sentiment ? " | " + sentiment : ""}
                    </div>
                `;
            }).join("");

            return `
                <div class="review-highlight-box">${html}</div>
                <div class="review-legend">${legend}</div>
            `;
        }

        function renderAnnotationBlock(r, currentFilters) {
            const annotations = r.annotations || [];
            if (!annotations.length) {
                return `<div class="annotations"><h4>Annotation Result</h4><div class="muted">No annotations.</div></div>`;
            }

            const filteredAnnotations = filterAnnotationsForDisplay(
                annotations,
                currentFilters.attributes,
                currentFilters.sentiments,
                currentFilters.reviewSentimentOnly
            );

            if (!filteredAnnotations.length) {
                return `<div class="annotations"><h4>Annotation Result</h4><div class="muted">No matching annotations for current filters.</div></div>`;
            }

            const grouped = groupAnnotations(filteredAnnotations);
            const reviewText = r.reviewText || r.review_text || "";

            return `
                <div class="annotations">
                    <h4>Annotation Result</h4>

                    <div class="annotation-section">
                        <div class="annotation-section-title">Title</div>
                        ${renderSpanLabelChips(grouped.title)}
                    </div>

                    <div class="annotation-section">
                        <div class="annotation-section-title">Description</div>
                        ${renderSpanLabelChips(grouped.description)}
                    </div>

                    <div class="annotation-section">
                        <div class="annotation-section-title">Review</div>
                        ${highlightReviewText(reviewText, grouped.review, currentFilters.query)}
                    </div>
                </div>
            `;
        }

        function getCurrentFilters() {
            return {
                query: document.getElementById("query").value.trim(),
                field: getSelectedRadio("field"),
                annotatedOnly: document.getElementById("annotated_only").checked,
                attributes: getCheckedValues("attribute"),
                reviewSentimentOnly: document.getElementById("review_sentiment_only").checked,
                sentiments: getCheckedValues("sentiment"),
                sortBy: document.getElementById("sort_by")?.value || "relevance"
            };
        }

        function clearFilters() {
            document.getElementById("query").value = "";
            document.querySelector(`input[name="field"][value="all"]`).checked = true;
            annotatedOnlyCheckbox.checked = false;
            reviewSentimentOnlyCheckbox.checked = false;
            clearCheckedValues("attribute");
            clearCheckedValues("sentiment");
            selectAllAttributesCheckbox.checked = false;
            selectAllAttributesCheckbox.indeterminate = false;
            
            updateFilterVisibility();
            
            const resultsDiv = document.getElementById("results");
            const detailsContainer = document.getElementById("details-container");
            const detailsDiv = document.getElementById("details");
            
            resultsDiv.innerHTML = `<div class="message muted">Filters cleared.</div>`;
            detailsContainer.style.display = "none";
            detailsDiv.textContent = "";
        }

        async function searchReviews() {
            const resultsDiv = document.getElementById("results");
            const detailsContainer = document.getElementById("details-container");
            const detailsDiv = document.getElementById("details");

            try {
                const filters = getCurrentFilters();

                const params = new URLSearchParams();
                params.append("q", filters.query);
                params.append("field", filters.field);
                params.append("annotated_only", filters.annotatedOnly);

                filters.attributes.forEach(v => params.append("attribute", v));

                if (filters.reviewSentimentOnly) {
                    params.append("review_sentiment_only", "true");
                    filters.sentiments.forEach(v => params.append("sentiment", v));
                }

                const url = `/api/search?${params.toString()}`;
                console.log("Fetching:", url);

                resultsDiv.innerHTML = `<div class="message muted">Loading...</div>`;
                detailsContainer.style.display = "none";
                detailsDiv.textContent = "";

                const res = await fetch(url);

                if (!res.ok) {
                    throw new Error(`HTTP error: ${res.status}`);
                }

                const data = await res.json();
                console.log("API response:", data);

                const sortedResults = sortResults(data.results || [], filters.sortBy);

                resultsDiv.innerHTML = "";

                if (!sortedResults || sortedResults.length === 0) {
                    resultsDiv.innerHTML = `<div class="message muted">No results found.</div>`;
                    return;
                }

                sortedResults.forEach(r => {
                    const resultBox = document.createElement("div");
                    resultBox.className = "result";

                    const annotationHtml = renderAnnotationBlock(r, filters);

                    const imageValue = Array.isArray(r.imageURL) ? r.imageURL[0] : r.imageURL;
                    const fallbackImage = "/static/placeholder.svg";

                    const imageHtml = imageValue
                        ? `<img src="${escapeHtml(imageValue)}" alt="Product image"
                                onerror="this.onerror=null; this.parentElement.innerHTML='<div class=&quot;image-placeholder&quot;><img src=&quot;/static/placeholder.svg&quot; alt=&quot;No image available&quot;></div>';">`
                        : `<div class="image-placeholder">
                                <img src="${fallbackImage}" alt="No image available">
                        </div>`;

                    const ratingText = (r.overall !== null && r.overall !== undefined && r.overall !== "")
                        ? `${escapeHtml(r.overall)} / 5`
                        : "N/A";

                    const titleHtml = highlightQueryMatches(r.title || "(no title)", filters.query);
                    const snippetHtml = highlightQueryMatches(buildSnippetText(r), filters.query);

                    resultBox.innerHTML = `
                        <div class="result-top">
                            <div class="result-image">
                                ${imageHtml}
                            </div>

                            <div class="result-main">
                                <div class="result-line"><strong>Doc ID:</strong> ${escapeHtml(r.doc_id)}</div>
                                <div class="result-line"><strong>Title:</strong> ${titleHtml}</div>
                                <div class="result-line snippet"><strong>Snippet:</strong> ${snippetHtml}</div>
                                <div class="result-line rating"><strong>Rating:</strong> ${ratingText}</div>
                                <div class="result-line score">
                                    <strong class="tooltip">
                                        Retrieval relevance
                                        <span class="tooltip-text">
                                            A relevance score from the search engine. Higher values indicate that the review is more relevant to the query.
                                        </span>
                                    </strong>:
                                    ${typeof r.score === "number" ? r.score.toFixed(4) : ""}
                                </div>
                                ${annotationHtml}
                                <div class="result-actions">
                                    <button onclick="viewDetails('${String(r.doc_id)}')">View Details</button>
                                </div>
                            </div>
                        </div>
                    `;

                    resultsDiv.appendChild(resultBox);
                });

            } catch (err) {
                console.error(err);
                resultsDiv.innerHTML = `<div class="message error">Error: ${escapeHtml(err.message)}</div>`;
            }
        }

        async function viewDetails(docId) {
            const detailsContainer = document.getElementById("details-container");
            const detailsDiv = document.getElementById("details");

            try {
                detailsContainer.style.display = "block";
                detailsDiv.textContent = "Loading document details...";

                const res = await fetch(`/api/doc/${encodeURIComponent(docId)}`);

                if (!res.ok) {
                    throw new Error(`HTTP error: ${res.status}`);
                }

                const data = await res.json();
                console.log("Document details:", data);

                detailsDiv.textContent = JSON.stringify(data, null, 2);
                detailsContainer.scrollIntoView({ behavior: "smooth" });

            } catch (err) {
                console.error(err);
                detailsContainer.style.display = "block";
                detailsDiv.textContent = `Failed to load document details: ${err.message}`;
            }
        }

        updateFilterVisibility();
    </script>
</body>
</html>

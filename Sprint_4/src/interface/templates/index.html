<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Product Reviews Corpus: Coleman</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px auto;
            max-width: 1100px;
            padding: 0 20px;
            background-color: #f8f8f8;
            color: #111;
        }

        h1 {
            font-size: 54px;
            margin-bottom: 40px;
        }

        h2 {
            font-size: 32px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .controls {
            background: #f3f3f3;
            border: 1px solid #ccc;
            border-radius: 14px;
            padding: 28px 32px;
            margin-bottom: 40px;
        }

        .row {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .row:last-child {
            margin-bottom: 0;
        }

        .label {
            width: 180px;
            font-weight: bold;
            font-size: 18px;
            line-height: 1.4;
            padding-top: 10px;
        }

        .input-group {
            flex: 1;
            min-width: 300px;
        }

        .search-line {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 280px;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 10px;
            outline: none;
            background: white;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: #666;
        }

        select {
            padding: 12px 14px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: white;
            min-width: 170px;
        }

        button {
            padding: 13px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #e0e0e0;
            cursor: pointer;
        }

        button:hover {
            background: #d5d5d5;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
            padding-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        #results {
            margin-top: 10px;
        }

        .result {
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 18px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .result-line {
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .result-line strong {
            display: inline-block;
            min-width: 80px;
        }

        .snippet {
            color: #333;
            margin-top: 6px;
        }

        .score {
            color: #666;
            font-size: 14px;
        }

        .annotations {
            margin-top: 12px;
            padding: 12px 14px;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .annotations ul {
            margin: 8px 0 0 18px;
            padding: 0;
        }

        .annotations li {
            margin-bottom: 6px;
        }

        .result-actions {
            margin-top: 14px;
        }

        .details-panel {
            margin-top: 40px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 22px;
            white-space: pre-wrap;
            overflow-x: auto;
        }

        .message {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            background: white;
            border: 1px solid #ddd;
        }

        .error {
            color: #b00020;
            background: #fff3f4;
            border-color: #f0c2c7;
        }

        .muted {
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Amazon Product Reviews Corpus: Coleman</h1>

    <div class="controls">
        <div class="row">
            <div class="label">Search</div>
            <div class="input-group">
                <div class="search-line">
                    <input id="query" type="text" placeholder="Enter keyword">
                    <button onclick="searchReviews()">Search</button>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="label">Search Field</div>
            <div class="input-group">
                <select id="field">
                    <option value="all">All</option>
                    <option value="title">Title</option>
                    <option value="description">Description</option>
                    <option value="reviewText">ReviewText</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="label">Annotation<br>Options</div>
            <div class="input-group">
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="annotated_only">
                        <span>Annotated data only</span>
                    </label>

                    <label class="checkbox-item">
                        <input type="checkbox" id="include_annotations">
                        <span>Include annotations in results</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <h2>Results</h2>
    <div id="results">
        <div class="message muted">No results found.</div>
    </div>

    <div id="details-container" style="display:none;">
        <h2>Document Details</h2>
        <div id="details" class="details-panel"></div>
    </div>

    <script>
        const queryInput = document.getElementById("query");
        queryInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                searchReviews();
            }
        });

        function escapeHtml(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function searchReviews() {
            const resultsDiv = document.getElementById("results");
            const detailsContainer = document.getElementById("details-container");
            const detailsDiv = document.getElementById("details");

            try {
                const q = document.getElementById("query").value.trim();
                const field = document.getElementById("field").value;
                const annotatedOnly = document.getElementById("annotated_only").checked;
                const includeAnnotations = document.getElementById("include_annotations").checked;

                const url = `/api/search?q=${encodeURIComponent(q)}&field=${encodeURIComponent(field)}&annotated_only=${annotatedOnly}&include_annotations=${includeAnnotations}`;
                console.log("Fetching:", url);

                resultsDiv.innerHTML = `<div class="message muted">Loading...</div>`;
                detailsContainer.style.display = "none";
                detailsDiv.textContent = "";

                const res = await fetch(url);

                if (!res.ok) {
                    throw new Error(`HTTP error: ${res.status}`);
                }

                const data = await res.json();
                console.log("API response:", data);

                resultsDiv.innerHTML = "";

                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = `<div class="message muted">No results found.</div>`;
                    return;
                }

                data.results.forEach(r => {
                    const resultBox = document.createElement("div");
                    resultBox.className = "result";

                    let annotationHtml = "";
                    if (r.annotations && r.annotations.length > 0) {
                        annotationHtml = `
                            <div class="annotations">
                                <strong>Annotations:</strong>
                                <ul>
                                    ${r.annotations.map(a => `
                                        <li>
                                            ${escapeHtml(a.section || "")}
                                            ${a.text ? " | " + escapeHtml(a.text) : ""}
                                            ${a.label ? " | " + escapeHtml(a.label) : ""}
                                            ${a.sentiment ? " | " + escapeHtml(a.sentiment) : ""}
                                        </li>
                                    `).join("")}
                                </ul>
                            </div>
                        `;
                    }

                    resultBox.innerHTML = `
                        <div class="result-line"><strong>Doc ID:</strong> ${escapeHtml(r.doc_id)}</div>
                        <div class="result-line"><strong>Title:</strong> ${escapeHtml(r.title || "(no title)")}</div>
                        <div class="result-line snippet"><strong>Snippet:</strong> ${escapeHtml(r.snippet || "")}</div>
                        <div class="result-line score"><strong>Score:</strong> ${typeof r.score === "number" ? r.score.toFixed(4) : ""}</div>
                        ${annotationHtml}
                        <div class="result-actions">
                            <button onclick="viewDetails('${escapeHtml(r.doc_id)}')">View Details</button>
                        </div>
                    `;

                    resultsDiv.appendChild(resultBox);
                });

            } catch (err) {
                console.error(err);
                resultsDiv.innerHTML = `<div class="message error">Error: ${escapeHtml(err.message)}</div>`;
            }
        }

        async function viewDetails(docId) {
            const detailsContainer = document.getElementById("details-container");
            const detailsDiv = document.getElementById("details");

            try {
                detailsContainer.style.display = "block";
                detailsDiv.textContent = "Loading document details...";

                const res = await fetch(`/api/doc/${encodeURIComponent(docId)}`);

                if (!res.ok) {
                    throw new Error(`HTTP error: ${res.status}`);
                }

                const data = await res.json();
                console.log("Document details:", data);

                detailsDiv.textContent = JSON.stringify(data, null, 2);
                detailsContainer.scrollIntoView({ behavior: "smooth" });

            } catch (err) {
                console.error(err);
                detailsContainer.style.display = "block";
                detailsDiv.textContent = `Failed to load document details: ${err.message}`;
            }
        }
    </script>

</body>
</html>

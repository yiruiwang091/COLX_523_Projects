version: "3.8"

services:
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio-colx523
    ports:
      - "8080:8080"
    volumes:
      - label_studio_data:/label-studio/data
    environment:
      - LABEL_STUDIO_USERNAME=admin@colx523.com
      - LABEL_STUDIO_PASSWORD=colx523admin
      - DEFAULT_USERNAME=admin@colx523.com
      - DEFAULT_PASSWORD=colx523admin
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - DEBUG=false
    restart: unless-stopped

  ml-backend-gpt5:
    build:
      context: ./src
      dockerfile: Dockerfile.ml
    ports:
      - "9090:9090"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_ID=gpt-5-mini
      - MODEL_LABEL=gpt-5-mini
      - REASONING_EFFORT=low
      - PORT=9090
    restart: unless-stopped

  ml-backend-gemini:
    build:
      context: ./src
      dockerfile: Dockerfile.ml
    ports:
      - "9091:9091"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_ID=gemini-3-flash-preview
      - MODEL_LABEL=gemini
      - PORT=9091
    restart: unless-stopped

volumes:
  label_studio_data:
